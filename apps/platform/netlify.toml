[build]
  base = "apps/platform"
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"
  edge_functions = "netlify/edge-functions"

[dev]
  command = "node ../../scripts/check-tunnel.js && pnpm vite"
  port = 8888
  targetPort = 5173
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"


