  excludedPath = ["/assets/*", "/images/*", "/fonts/*", "/api/*"]

# ============================================================================
# REDIRECTS
# ============================================================================

# --- GENERATED BRIQUE REDIRECTS START ---
[[redirects]]
  from = "/api/wiki-sync"
  to = "/.netlify/functions/gen-wiki-sync"
  status = 200

[[redirects]]
  from = "/api/wiki-resolve"
  to = "/.netlify/functions/gen-wiki-resolve"
  status = 200

[[redirects]]
  from = "/api/wiki-propose"
  to = "/.netlify/functions/gen-wiki-propose"
  status = 200

[[redirects]]
  from = "/api/wiki-optimize-title"
  to = "/.netlify/functions/gen-wiki-optimize-title"
  status = 200

[[redirects]]
  from = "/api/wiki-propose-ai"
  to = "/.netlify/functions/gen-wiki-propose-ai"
  status = 200

[[redirects]]
  from = "/api/wiki-search"
  to = "/.netlify/functions/gen-wiki-search"
  status = 200
# --- GENERATED BRIQUE REDIRECTS END ---

[[redirects]]
  from = "/api/config"
  to = "/.netlify/functions/config"
  status = 200

# Fallback pour le SPA
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ============================================================================
# HEADERS
# ============================================================================

[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "Content-Type, Authorization, X-Ophelia-Instance"
    Access-Control-Expose-Headers = "X-Ophelia-Instance, X-Ophelia-Instance-Name, X-Ophelia-Supabase-URL, X-Ophelia-Supabase-Anon-Key, X-Ophelia-Instance-Error"
